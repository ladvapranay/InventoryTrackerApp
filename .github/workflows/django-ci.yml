# Continuous Integration workflow for the Inventory Tracker application
name: Django CI

on:
  push:
    branches:
      - main
      - feature/testing
      - feature/security

  pull_request:
    branches:
      - main

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    env:
      SECRET_KEY: test-secret-key
      DEBUG: "True"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run database migrations
        run: |
          python manage.py migrate

      - name: Run unit tests
        run: |
          python manage.py test